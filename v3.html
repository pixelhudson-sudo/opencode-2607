<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pit Config</title>
<style>
  :root {
    color-scheme: dark;
    --surface-1: #1a1e24;
    --surface-2: #20252d;
    --surface-3: #262c35;
    --page: #0e1013;
    --text-primary: #eef1f5;
    --text-secondary: #98a2b0;
    --text-muted: #62697a;
    --border: rgba(238,241,245,0.09);
    --border-strong: #333a45;
    --grid: #232830;
    --accent: #5b9ee6;
    --accent-ink: #0e1013;
    --accent-wash: rgba(91,158,230,0.14);
    --measure: #e8a33d;
    --measure-wash: rgba(232,163,61,0.14);
    --danger: #e2685f;
    --canvas-bg: #15181d;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 28px rgba(0,0,0,0.35);
  }
  @media (prefers-color-scheme: light) {
    :root:where(:not([data-theme="dark"])) {
      color-scheme: light;
      --surface-1: #f4f2ec;
      --surface-2: #fffefb;
      --surface-3: #ebe8df;
      --page: #eeece4;
      --text-primary: #1c1b17;
      --text-secondary: #57544a;
      --text-muted: #8b8779;
      --border: rgba(28,27,23,0.10);
      --border-strong: #d8d3c4;
      --grid: #e3ded0;
      --accent: #2f6fb0;
      --accent-ink: #ffffff;
      --accent-wash: rgba(47,111,176,0.12);
      --measure: #b9781f;
      --measure-wash: rgba(185,120,31,0.14);
      --danger: #b53f36;
      --canvas-bg: #e9e5d9;
      --shadow: 0 1px 2px rgba(28,27,23,0.06), 0 8px 24px rgba(28,27,23,0.08);
    }
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --surface-1: #f4f2ec;
    --surface-2: #fffefb;
    --surface-3: #ebe8df;
    --page: #eeece4;
    --text-primary: #1c1b17;
    --text-secondary: #57544a;
    --text-muted: #8b8779;
    --border: rgba(28,27,23,0.10);
    --border-strong: #d8d3c4;
    --grid: #e3ded0;
    --accent: #2f6fb0;
    --accent-ink: #ffffff;
    --accent-wash: rgba(47,111,176,0.12);
    --measure: #b9781f;
    --measure-wash: rgba(185,120,31,0.14);
    --danger: #b53f36;
    --canvas-bg: #e9e5d9;
    --shadow: 0 1px 2px rgba(28,27,23,0.06), 0 8px 24px rgba(28,27,23,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overscroll-behavior:none; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--page);
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    height: 100dvh;
  }
  button {
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text-primary);
    border-radius: 5px;
    padding: 7px 11px;
    cursor: pointer;
    line-height: 1.2;
    transition: background .12s, border-color .12s, transform .05s;
    min-height: 34px;
  }
  button:hover { background: var(--accent-wash); border-color: var(--accent); }
  button:active { transform: translateY(0.5px); }
  button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }
  button.icon-btn { padding: 7px 9px; }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }
  button.primary:hover { filter: brightness(1.08); background: var(--accent); }
  button.danger:hover { background: rgba(226,104,95,0.10); border-color: var(--danger); color: var(--danger); }
  input, textarea, select {
    font-family: inherit;
    font-size: 12.5px;
    color: var(--text-primary);
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 6px 8px;
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  input[type="range"] { padding: 0; border: none; background: transparent; accent-color: var(--accent); }
  input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); }
  label { color: var(--text-secondary); }
  hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ---------- Toolbar ---------- */
  #toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px;
    padding: 8px 12px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    z-index: 20;
  }
  #toolbar .brand {
    font-weight: 800; font-size: 13px; margin-right: 6px; white-space: nowrap;
    text-transform: uppercase; letter-spacing: .09em; color: var(--text-primary);
    padding-left: 10px; border-left: 3px solid var(--accent);
  }
  #toolbar .brand b { color: var(--accent); font-weight: 800; }
  #toolbar .sep { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }
  #toolbar .counters {
    margin-left: auto; font-size: 11.5px; color: var(--text-muted);
    display: flex; gap: 10px; white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  #panelToggles { display: none; gap: 6px; }
  #themeBtn { font-size: 15px; padding: 7px 10px; }

  /* ---------- Main layout ---------- */
  #main { display: grid; grid-template-columns: 200px 6px 1fr 6px 240px; min-height: 0; position: relative; }
  #panelScrim { display: none; }
  #palette, #props {
    background: var(--surface-1);
    overflow: hidden;
    padding: 6px 10px;
    -webkit-overflow-scrolling: touch;
    min-width: 0; min-height: 0;
    font-family: var(--sidebar-font, inherit);
    font-size: var(--sidebar-font-size, 13px);
    display: flex; flex-direction: column;
  }
  #palette { border-right: 1px solid var(--border); }
  #props { border-left: 1px solid var(--border); }
  @media (max-width: 820px) { #palette, #props { overflow: auto; } }
  .divider {
    cursor: col-resize; background: transparent; position: relative;
  }
  .divider::after {
    content: ""; position: absolute; top: 0; bottom: 0; left: 2px; width: 2px;
    background: var(--border-strong);
  }
  .divider:hover::after, .divider.dragging::after { background: var(--accent); width: 3px; left: 1.5px; }
  @media (max-width: 820px) { .divider { display: none; } }
  #palette h4, #props h4 {
    margin: 0; font-size: 10.5px; color: var(--text-secondary); font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    padding-left: 8px; border-left: 2px solid var(--accent);
  }
  #palette button, #props button { min-height: 28px; padding: 5px 9px; }
  #palette label.file-btn {
    display: block; text-align: left; padding: 5px 9px; cursor: pointer;
    border: 1px solid var(--border-strong); border-radius: 7px; background: var(--surface-2);
  }
  #palette label.file-btn:hover { background: var(--accent-wash); border-color: var(--accent); }
  #palette .row { display:flex; align-items:center; gap:6px; }
  #palette .checkline { display:flex; align-items:center; gap:7px; padding:2px 2px; cursor:pointer; }
  #palette button[data-tool] { display:flex; align-items:center; gap:8px; text-align:left; }
  #palette button[data-tool] .sw { width:16px; height:16px; flex:none; }
  #palette .tool-grid button[data-tool] { all:unset; display:flex; align-items:center; gap:6px; padding:6px 8px; font-size:12px; min-height:30px; cursor:pointer; border:1px solid var(--border-strong); border-radius:5px; background:var(--surface-2); color:var(--text-primary); font-family:inherit; transition:background .12s,border-color .12s; }
  #palette .tool-grid button[data-tool]:hover { background:var(--accent-wash); border-color:var(--accent); }
  #palette .tool-grid button[data-tool].active { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }

  #propsBody label { display:block; margin:6px 0 2px; font-size: 11px; }
  #propsBody input, #propsBody textarea { width:100%; }
  #propsBody textarea { height: 50px; resize: vertical; }
  #propsBody em { color: var(--text-muted); font-style: normal; }
  #propsGrid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 8px; }
  #propsGrid2 label { display:block; font-size:11px; }
  #propsGrid2 input { width:100%; margin-top:3px; }

  /* ---------- Sidebar modules (vertically resizable) ---------- */
  .module { display:flex; flex-direction:column; gap:5px; overflow:hidden; padding: 8px 2px; }
  .module-body { overflow:auto; flex:1; min-height:0; display:flex; flex-direction:column; gap:6px; }
  .module-body > label:not(.checkline):not(.file-btn) { display:block; }
  .module-body > label > input, .module-body > label > select, .module-body > label > textarea { display:block; width:100%; margin-top:3px; }
  .module-body button { width:100%; }
  .module-head {
    display:flex; align-items:center; justify-content:space-between; flex:none;
    padding-bottom:6px; margin-bottom:2px; border-bottom: 1px solid var(--border);
  }
  button[data-tool="measure"] { border-color: var(--measure); color: var(--measure); }
  button[data-tool="measure"]:hover { background: var(--measure-wash); }
  button[data-tool="measure"].active { background: var(--measure); color: var(--surface-1); border-color: var(--measure); }
  .hdivider {
    flex:none; height:6px; cursor:row-resize; position:relative; margin: 0 -2px;
  }
  .hdivider::after {
    content:""; position:absolute; left:0; right:0; top:2px; height:2px;
    background: var(--border-strong);
  }
  .hdivider:hover::after, .hdivider.dragging::after { background: var(--accent); height:3px; top:1.5px; }
  @media (max-width: 820px) { .hdivider { display:none; } .module { overflow:visible; } .module-body { overflow:visible; } }

  #canvasWrap {
    position: relative; overflow: auto; background: var(--canvas-bg);
    min-width: 0; min-height: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #canvas { display: block; background: transparent; touch-action: none; cursor: crosshair; }
  #empty-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: var(--text-muted); font-size: 15px; text-align: center; pointer-events: none;
    line-height: 1.6;
  }
  #rulerLen {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: var(--page); padding: 5px 12px; border-radius: 20px;
    font-size: 12px; display: none; z-index: 5; box-shadow: var(--shadow);
  }
  .item:not(.selected):hover circle:first-child { fill: var(--accent); fill-opacity: 0.12; }

  #props .hint { font-size:11px; color:var(--text-muted); }

  /* ---------- Tool grid (2 columns) ---------- */
  .tool-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .tool-grid button {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    padding: 6px 8px;
    font-size: 12px;
    min-height: 30px;
    position: relative;
  }
  .tool-grid button .tk {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
    font-weight: 400;
  }
  .tool-grid button .ti {
    width: 18px;
    text-align: center;
    flex: none;
    font-size: 14px;
  }
  .tool-grid button.active .tk { color: var(--accent-ink); opacity: 0.7; }

  /* ---------- Tooltip (div-based, appears on hover) ---------- */
  .tt-wrap { position: relative; display: inline-flex; }
  .tt {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-1);
    color: var(--text-primary);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11.5px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-strong);
    z-index: 30;
    font-weight: 400;
  }
  .tt-wrap:hover .tt { opacity: 1; }
  .tt kbd {
    background: var(--accent-wash);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    padding: 0 5px;
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
  }

  /* ---------- Bounding box / transform handles ---------- */
  .bbox {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.5;
    stroke-dasharray: 5,3;
    pointer-events: none;
  }
  .bhandle {
    fill: var(--surface-2);
    stroke: var(--accent);
    stroke-width: 1.5;
    cursor: nwse-resize;
    pointer-events: auto;
  }
  .bhandle:hover { fill: var(--accent); }
  .bhandle-rot {
    fill: var(--accent);
    stroke: var(--surface-1);
    stroke-width: 1.5;
    cursor: grab;
    pointer-events: auto;
  }
  .bhandle-move {
    cursor: move;
    fill: var(--accent);
    fill-opacity: 0.08;
    stroke: none;
    pointer-events: auto;
  }
  .bhandle-move:hover { fill-opacity: 0.18; }

  /* ---------- Crop overlay ---------- */
  #crop-overlay { display: none; }
  .crop-shade {
    fill: rgba(0,0,0,0.45);
    pointer-events: none;
  }
  .crop-rect {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    pointer-events: none;
  }
  .crop-handle {
    fill: var(--surface-2);
    stroke: var(--accent);
    stroke-width: 1.5;
    cursor: nwse-resize;
  }

  /* ---------- Measure draft line ---------- */
  .measure-draft {
    stroke: var(--measure);
    stroke-width: 2;
    stroke-dasharray: 8,4;
    pointer-events: none;
  }
  .measure-draft-dot {
    fill: var(--measure);
    pointer-events: none;
  }

  /* ---------- Hand cursor overlay ---------- */
  #canvasWrap.hand-mode { cursor: grab; }
  #canvasWrap.hand-mode:active { cursor: grabbing; }
  #canvasWrap.crop-mode { cursor: crosshair; }

  /* ---------- Two-column items ---------- */
  .item-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .item-grid button {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    font-size: 12px;
    min-height: 30px;
  }
  .item-grid button { all:unset; display:flex; align-items:center; gap:6px; padding:6px 8px; font-size:12px; min-height:30px; cursor:pointer; border:1px solid var(--border-strong); border-radius:5px; background:var(--surface-2); color:var(--text-primary); font-family:inherit; transition:background .12s,border-color .12s; }
  .item-grid button:hover { background:var(--accent-wash); border-color:var(--accent); }
  .item-grid button.active { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:700; }
  .item-grid button .sw { width: 16px; height: 16px; flex: none; }
  .item-grid .full { grid-column: 1 / -1; }
  .item-grid .checkline { grid-column: 1 / -1; justify-content: center; }
  .fo-input {
    width:100%; height:100%; box-sizing:border-box; font-size:inherit;
    border:1.5px solid var(--accent); background: var(--surface-2); color: var(--text-primary);
    border-radius:4px; font-family:inherit;
  }

  /* ---------- Riser modal ---------- */
  #riserModal {
    display:none; position:fixed; inset:0; background:rgba(11,11,11,0.35);
    align-items:center; justify-content:center; z-index:50;
  }
  #riserModal .card {
    background: var(--surface-1); border-radius: 12px; padding: 18px; width: 260px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  #riserModal h3 { margin: 0 0 12px; font-size: 14px; }
  #riserModal .actions { display:flex; gap:8px; margin-top: 14px; justify-content:flex-end; }

  @media print {
    #toolbar, #palette, #props { display:none !important; }
    #main { grid-template-columns:1fr; }
    #canvasWrap { overflow:visible; background:#fff; }
    #canvas { width:100% !important; height:auto !important; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 820px) {
    #toolbar .label-text { display:none; }
    #toolbar button { padding: 7px 8px; }
    #toolbar .counters { display:none; }
    #panelToggles { display:flex; }
    #main { grid-template-columns: 1fr; }
    #palette, #props {
      position: absolute; top: 0; bottom: 0; width: min(78vw, 300px);
      box-shadow: var(--shadow); transition: transform .18s ease; z-index: 15;
    }
    #palette { left: 0; transform: translateX(-105%); }
    #palette.open { transform: translateX(0); }
    #props { right: 0; transform: translateX(105%); }
    #props.open { transform: translateX(0); }
    #panelScrim {
      display:none; position:absolute; inset:0; background:rgba(11,11,11,0.3); z-index:14;
    }
    #panelScrim.show { display:block; }
    button { min-height: 38px; }
    #canvasWrap { overflow: hidden; display: flex; align-items: flex-start; }
    #canvas { width: 100%; height: auto; aspect-ratio: 1200 / 900; }
  }
</style>
</head>
<body>
<div id="toolbar">
  <span class="brand">Pit<b>Plot</b></span>
  <div class="sep"></div>
  <div id="panelToggles">
    <button id="paletteToggleBtn" class="icon-btn" title="Items panel">☰ Items</button>
    <button id="propsToggleBtn" class="icon-btn" title="Properties panel">Props ▤</button>
  </div>
  <button id="newBtn">＋<span class="label-text"> New</span></button>
  <button id="openFileBtn">📂<span class="label-text"> Open file</span></button>
  <button id="openServerBtn">☁︎<span class="label-text"> Open server</span></button>
  <input type="file" id="openFile" accept=".json" style="display:none">
  <div class="sep"></div>
  <button id="saveFileBtn" class="primary">💾<span class="label-text"> Save file</span></button>
  <button id="saveServerBtn" class="primary">☁︎↑<span class="label-text"> Save server</span></button>
  <button id="exportPngBtn">🖼<span class="label-text"> Export PNG</span></button>
  <div class="sep"></div>
  <button id="undoBtn" class="icon-btn" title="Undo (Ctrl+Z)">↶</button>
  <button id="redoBtn" class="icon-btn" title="Redo (Ctrl+Shift+Z)">↷</button>
  <div class="counters" id="counters"></div>
  <button id="themeBtn" class="icon-btn" title="Toggle theme">◐</button>
</div>
<div id="main">
  <div id="panelScrim"></div>
  <div id="palette">
    <div class="module" id="modInfo" style="flex:0 0 auto;">
      <div class="module-head"><h4>Title / file name</h4></div>
      <div class="module-body">
        <input id="metaTitle" type="text" placeholder="pit_" style="width:100%;">
      </div>
    </div>
    <div class="hdivider" data-module="modImage"></div>
    <div class="module" id="modImage" style="flex:0 0 auto;">
      <div class="module-head"><h4>Pit Image</h4></div>
      <div class="module-body">
        <div class="row" style="gap:4px;">
          <label class="file-btn" style="flex:1;margin:0;text-align:center;min-height:30px;line-height:30px;padding:0 6px;font-size:12px;">Upload <input type="file" id="bgFile" accept="image/*" style="display:none"></label>
          <button id="lockBgBtn" style="flex:1;min-height:30px;font-size:12px;">Lock</button>
          <button id="removeBgBtn" style="flex:1;min-height:30px;font-size:12px;">Remove</button>
        </div>
        <label>Opacity <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.5"></label>
      </div>
    </div>
    <div class="hdivider" data-module="modRuler"></div>
    <div class="module" id="modRuler" style="flex:0 0 auto;">
      <div class="module-head"><h4>Ruler</h4></div>
      <div class="module-body">
        <div class="row" style="gap:4px;">
          <button id="rulerToggleBtn" style="flex:0 0 48px;min-height:30px;font-size:12px;">Show</button>
          <label style="flex:1;margin:0;">Length (m) <input type="text" id="rulerMeters" step="0.01" min="0.01" value="5" style="width:100%;"></label>
        </div>
      </div>
    </div>
    <div class="hdivider" data-module="modTools"></div>
    <div class="module" id="modTools" style="flex:0 0 auto;">
      <div class="module-head"><h4>Tools</h4></div>
      <div class="module-body">
        <div class="tool-grid">
          <button class="tt-wrap" data-tool="select"><span class="ti">⤻</span>Select<span class="tk">V</span><span class="tt">Select/move items <kbd>V</kbd></span></button>
          <button class="tt-wrap" data-tool="direct"><span class="ti">⟐</span>Direct<span class="tk">A</span><span class="tt">Select similar items <kbd>A</kbd></span></button>
          <button class="tt-wrap" data-tool="marquee"><span class="ti">▭</span>Marquee<span class="tk">M</span><span class="tt">Rectangular selection <kbd>M</kbd></span></button>
          <button class="tt-wrap" data-tool="measure"><span class="ti">⇥</span>Ruler<span class="tk">I</span><span class="tt">2-point ruler <kbd>I</kbd> · Shift to constrain</span></button>
          <button class="tt-wrap" data-tool="crop"><span class="ti">⛌</span>Crop<span class="tk">C</span><span class="tt">Crop image <kbd>C</kbd></span></button>
          <button class="tt-wrap" data-tool="hand"><span class="ti">✋</span>Hand<span class="tk">Space</span><span class="tt">Pan canvas <kbd>Space</kbd></span></button>
          <button class="tt-wrap" data-tool="zoom"><span class="ti">🔍</span>Zoom<span class="tk">Z</span><span class="tt">Zoom in/out <kbd>Z</kbd> · <kbd>⌘+</kbd><kbd>⌘-</kbd></span></button>
          <button class="tt-wrap" id="groupBtn"><span class="ti">⊞</span>Group<span class="tk">⌘G</span><span class="tt">Group selected items <kbd>⌘G</kbd></span></button>
          <button class="tt-wrap" id="ungroupBtn"><span class="ti">⊟</span>Ungroup<span class="tk">⇧⌘G</span><span class="tt">Ungroup selected <kbd>⇧⌘G</kbd></span></button>
        </div>

    <div class="hdivider" data-module="modItems"></div>
    <div class="module" id="modItems" style="flex:1 1 auto;">

      <div class="module-body">
        <div class="item-grid">
          <button data-tool="chair"><span class="sw">🪑</span> Chair</button>

    <div class="module" id="modProps" style="flex:1 1 auto;">

          <label style="flex:1;margin:0;font-size:11px;">Feet <input type="text" id="convFt" placeholder="whole" style="width:100%;"></label>
          <label style="flex:1;margin:0;font-size:11px;">Inches <input type="text" id="convIn" style="width:100%;"></label>

          <select id="sidebarFontSel">
            <option value="system-ui, -apple-system, 'Segoe UI', sans-serif">System UI</option>
            <option value="Arial, sans-serif">Arial</option>

          <select id="sidebarFontSizeSel">
            <option value="6">6px</option>

<div id="riserModal">
  <div class="card">
    <h3>Create riser</h3>
    <label>Length (m)<input type="number" id="riserL" step="0.1" min="0.1" value="2.4" style="width:100%; margin-top:4px;"></label>
    <label style="display:block; margin-top:10px;">Width (m)<input type="number" id="riserWd" step="0.1" min="0.1" value="1.2" style="width:100%; margin-top:4px;"></label>
    <label style="display:block; margin-top:10px;">Height (m)<input type="number" id="riserH" step="0.1" min="0" value="0.6" style="width:100%; margin-top:4px;"></label>
    <div class="actions">
      <button id="riserCancelBtn">Cancel</button>
      <button id="riserCreateBtn" class="active">Create</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ STATE ============ */
const AUTOSAVE_KEY = "pitconfig-autosave";
let model = emptyModel();
let selection = new Set(); // item ids
let tool = null; // 'chair'|'stand'|'riser'|'piano'|'comment'|'textbox'
let history = [], historyIdx = -1; // snapshot stack, cap 100
let idCounter = 1;
let editingId = null; // item id currently in inline text-edit mode
let measureDraft = null; // {x1,y1} while placing first point of 2-point ruler tool

function emptyModel() {
  return {
    version: 1,
    meta: { title: "", city: "", date: "", venue: "" },
    background: { dataUrl: "", opacity: 0.5, x: 0, y: 0, w: 800, h: 600, locked: false },
    ruler: { y: 100, meters: 5, visible: false },
    canvasMeters: 30,
    items: []
  };
}
function newId() { return "i" + (idCounter++); }
const CANVAS_W = 1200;
function S() { return CANVAS_W / (model.canvasMeters || 30); } // px-per-meter, canvas width in meters is user-adjustable
function snap(v) { return document.getElementById("snapGrid").checked ? Math.round(v / 0.25) * 0.25 : v; }

/* ============ THEME ============ */
(function initTheme() {
  const btn = document.getElementById("themeBtn");
  const saved = localStorage.getItem("pitconfig-theme");
  if (saved) document.documentElement.setAttribute("data-theme", saved);
  btn.addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    const next = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("pitconfig-theme", next);
  });
})();

/* ============ MOBILE PANELS ============ */
(function initPanels() {
  const palette = document.getElementById("palette"), props = document.getElementById("props");
  const scrim = document.getElementById("panelScrim");
  function closeAll() { palette.classList.remove("open"); props.classList.remove("open"); scrim.classList.remove("show"); }
  document.getElementById("paletteToggleBtn").addEventListener("click", () => {
    const willOpen = !palette.classList.contains("open");
    closeAll();
    if (willOpen) { palette.classList.add("open"); scrim.classList.add("show"); }
  });
  document.getElementById("propsToggleBtn").addEventListener("click", () => {
    const willOpen = !props.classList.contains("open");
    closeAll();
    if (willOpen) { props.classList.add("open"); scrim.classList.add("show"); }
  });
  scrim.addEventListener("click", closeAll);
  window._closePanels = closeAll;
})();

/* ============ HISTORY (undo/redo) ============ */
function pushHistory() {
  // ponytail: full-JSON snapshot stack, fine at pit-diagram item counts (tens, not thousands)
  history = history.slice(0, historyIdx + 1);
  history.push(JSON.stringify(model));
  if (history.length > 100) history.shift();
  historyIdx = history.length - 1;
}
function undo() {
  if (historyIdx <= 0) return;
  historyIdx--;
  model = JSON.parse(history[historyIdx]);
  selection.clear();
  render(); scheduleAutosave();
}
function redo() {
  if (historyIdx >= history.length - 1) return;
  historyIdx++;
  model = JSON.parse(history[historyIdx]);
  selection.clear();
  render(); scheduleAutosave();
}

/* ============ ITEM SHAPE GENERATORS ============ */
const DEFAULT_SIZE_M = { chair: 0.5, stand: 0.35, piano: { w: 1.5, h: 2 } };

function itemFootprintRadiusM(item) {
  const scale = item.scale || 1;
  if (item.type === "chair") return DEFAULT_SIZE_M.chair * scale * 0.5;
  if (item.type === "stand") return DEFAULT_SIZE_M.stand * scale * 0.5;
  if (item.type === "piano") return Math.max(DEFAULT_SIZE_M.piano.w, DEFAULT_SIZE_M.piano.h) * scale * 0.5;
  if (item.type === "riser") return Math.max(item.l || 2.4, item.wd || 1.2) * 0.5;
  return 0.5;
}

function shapeMarkup(item) {
  const type = item.type, s = S(), scale = item.scale || 1;
  const ink = "var(--text-primary)";
  switch (type) {
    case "chair": {
      const w = DEFAULT_SIZE_M.chair * scale * s;
      return `<rect x="${-w/2}" y="${-w/2}" width="${w}" height="${w}" fill="var(--surface-2)" stroke="${ink}" stroke-width="1.5"/>
              <rect x="${-w/2}" y="${-w/2}" width="${w}" height="${w*0.32}" fill="${ink}" fill-opacity="0.35"/>`;
    }
    case "stand": {
      const w = DEFAULT_SIZE_M.stand * scale * s;
      return `<line x1="${-w*0.4}" y1="${w*0.5}" x2="0" y2="${-w*0.15}" stroke="${ink}" stroke-width="1.5"/>
              <line x1="${w*0.4}" y1="${w*0.5}" x2="0" y2="${-w*0.15}" stroke="${ink}" stroke-width="1.5"/>
              <line x1="0" y1="${w*0.5}" x2="0" y2="${-w*0.15}" stroke="${ink}" stroke-width="1.5"/>
              <rect x="${-w*0.42}" y="${-w*0.55}" width="${w*0.84}" height="${w*0.22}" rx="${w*0.04}" fill="${ink}" transform="rotate(-15 0 ${-w*0.44})"/>`;
    }
    case "riser": {
      const l = (item.l || 2.4) * s, wd = (item.wd || 1.2) * s;
      return `<rect x="${-l/2}" y="${-wd/2}" width="${l}" height="${wd}" fill="var(--accent-wash)" stroke="${ink}" stroke-width="2"/>`;
    }
    case "piano": {
      const w = DEFAULT_SIZE_M.piano.w * scale * s, h = DEFAULT_SIZE_M.piano.h * scale * s;
      return `<path d="M ${-w/2} ${-h/2}
               L ${w/2} ${-h/2}
               L ${w/2} ${h/6}
               Q ${w/2} ${h/2} 0 ${h/2}
               Q ${-w/2} ${h/2} ${-w/2} ${h/6}
               Z" fill="none" stroke="${ink}" stroke-width="2"/>`;
    }
  }
  return "";
}

/* ============ RENDERING ============ */
const svg = document.getElementById("canvas");

function render() {
  const s = S();
  const viewH = Math.round(CANVAS_W / (4/3));
  svg.setAttribute("viewBox", `0 0 ${CANVAS_W} ${viewH}`);
  svg.style.aspectRatio = `${CANVAS_W} / ${viewH}`;

  const rulerBtn = document.getElementById("rulerToggleBtn");
  rulerBtn.classList.toggle("active", model.ruler.visible);
  rulerBtn.textContent = model.ruler.visible ? "Hide ruler" : "Show ruler";
  document.getElementById("rulerMeters").value = model.ruler.meters;
  syncLockBgBtn();

  let html = "";

  if (model.background.dataUrl) {
    const bg = model.background;
    const locked = !!bg.locked;
    html += `<image href="${bg.dataUrl}" x="${bg.x}" y="${bg.y}" width="${bg.w}" height="${bg.h}"
              opacity="${bg.opacity}" ${locked ? "" : 'data-bg="1"'} style="cursor:${locked ? "default" : "move"}"/>`;
    if (!locked) {
      html += `<rect class="bg-resize" x="${bg.x+bg.w-10}" y="${bg.y+bg.h-10}" width="20" height="20"
                fill="var(--accent)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:nwse-resize"/>`;
    }
  }

  if (model.ruler.visible) {
    const r = model.ruler;
    const lenPx = r.meters * s;
    const cxMid = CANVAS_W / 2;
    const x1 = cxMid - lenPx / 2, x2 = cxMid + lenPx / 2;
    html += `<g class="ruler-group">
      <line x1="${x1}" y1="${r.y}" x2="${x2}" y2="${r.y}" stroke="var(--measure)" stroke-width="2"/>
      <circle class="ruler-handle" cx="${cxMid}" cy="${r.y}" r="10" fill="var(--measure)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:ns-resize"/>
    </g>`;
  }

  const drawOrder = [...model.items].sort((a, b) => (a.type === "riser" ? 0 : 1) - (b.type === "riser" ? 0 : 1));
  for (const item of drawOrder) {
    const selected = selection.has(item.id);
    if (item.type === "measure") {
      html += renderMeasure(item, selected);
      continue;
    }
    const x = item.x * s, y = item.y * s;
    if (item.type === "comment") {
      html += renderComment(item, x, y, selected);
    } else if (item.type === "textbox") {
      html += renderTextbox(item, x, y, selected);
    } else {
      const footprintR = itemFootprintRadiusM(item) * s;
      html += `<g class="item${selected ? " selected" : ""}" data-id="${item.id}" transform="translate(${x} ${y}) rotate(${item.rot||0})">
                 <circle r="${Math.max(footprintR, 18)}" fill="${selected ? "var(--accent)" : "#000"}" fill-opacity="${selected ? 0.14 : 0.001}" style="cursor:move"/>
                 ${selected ? `<circle r="${footprintR + 6}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="5,3"/>` : ""}
                 ${shapeMarkup(item)}
               </g>`;
      if (selected && selection.size === 1 && !model.items.some(i => selection.has(i.id) && i.groupId)) {
        const rad = (item.rot||0) * Math.PI/180;
        const handleDist = footprintR + 22;
        const hx = x + Math.sin(rad) * handleDist;
        const hy = y - Math.cos(rad) * handleDist;
        html += `<circle class="rot-handle" data-id="${item.id}" cx="${hx}" cy="${hy}" r="16" fill="var(--accent)" fill-opacity="0.15" stroke="none" style="cursor:grab"/>
                 <circle class="rot-handle" data-id="${item.id}" cx="${hx}" cy="${hy}" r="7" fill="var(--accent)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:grab" pointer-events="none"/>`;
      }
    }
  }

  // Bounding box
  html += renderBoundingBox();

  // Measure draft line (dynamic while placing first point)
  if (activeTool === 'measure' && measureDraft) {
    const { x: cx2, y: cy2 } = _lastCanvasPos || { x: 0, y: 0 };
    const dx = measureDraft.x1 * S(), dy = measureDraft.y1 * S();
    html += `<line x1="${dx}" y1="${dy}" x2="${cx2}" y2="${cy2}" class="measure-draft"/>
      <circle cx="${dx}" cy="${dy}" r="5" class="measure-draft-dot"/>`;
  }

  svg.innerHTML = html;
  updateCounters();
  updateEmptyHint();
  renderProps();
}

function renderComment(item, x, y, selected) {
  if (editingId === item.id) return foreignEdit(item, x, y, 140, 40, false);
  const fs = item.fontSize || 14;
  const w = Math.max(30, item.text.length * fs * 0.55) + 12;
  const h = fs + 12;
  return `<g class="item" data-id="${item.id}" transform="translate(${x} ${y})">
    ${selected ? `<rect x="${-w/2-3}" y="${-h/2-3}" width="${w+6}" height="${h+6}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3"/>` : ""}
    <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="6" fill="var(--surface-2)" fill-opacity="0.9" stroke="var(--border-strong)"/>
    <text x="0" y="${fs*0.35}" text-anchor="middle" font-size="${fs}" fill="var(--text-primary)">${escapeXml(item.text)}</text>
  </g>`;
}

function renderTextbox(item, x, y, selected) {
  if (editingId === item.id) return foreignEdit(item, x, y, item.w, item.h, true);
  const lines = (item.text || "City\nDate & Time").split("\n");
  const op = item.opacity !== undefined ? item.opacity : 1;
  return `<g class="item" data-id="${item.id}" transform="translate(${x} ${y})">
    ${selected ? `<rect x="${-item.w/2-3}" y="${-item.h/2-3}" width="${item.w+6}" height="${item.h+6}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3"/>` : ""}
    <rect x="${-item.w/2}" y="${-item.h/2}" width="${item.w}" height="${item.h}" fill="var(--surface-2)" fill-opacity="${0.95 * op}" stroke="var(--border-strong)" opacity="${op}"/>
    <text x="0" y="${-2}" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary)" opacity="${op}">${escapeXml(lines[0]||"")}</text>
    <text x="0" y="16" text-anchor="middle" font-size="12" fill="var(--text-secondary)" opacity="${op}">${escapeXml(lines[1]||"")}</text>
  </g>`;
}

function foreignEdit(item, x, y, w, h, isTextbox) {
  return `<foreignObject class="item" data-id="${item.id}" x="${x - w/2}" y="${y - h/2}" width="${w}" height="${h}">
    <textarea class="fo-input" xmlns="http://www.w3.org/1999/xhtml" id="foInput">${isTextbox ? (item.text||"City\nDate & Time") : (item.text||"")}</textarea>
  </foreignObject>`;
}

function escapeXml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updateCounters() {
  const counts = {};
  for (const it of model.items) counts[it.type] = (counts[it.type]||0) + 1;
  document.getElementById("counters").textContent =
    `Chairs ${counts.chair||0} · Stands ${counts.stand||0} · Risers ${counts.riser||0} · Piano ${counts.piano||0} · Comments ${counts.comment||0}`;
}

function updateEmptyHint() {
  const empty = !model.background.dataUrl && model.items.length === 0;
  document.getElementById("empty-hint").style.display = empty ? "block" : "none";
}

function renderProps() {
  const body = document.getElementById("propsBody");
  if (selection.size === 0) { body.innerHTML = "<em>No selection</em>"; return; }
  if (selection.size === 1) {
    const item = model.items.find(i => i.id === [...selection][0]);
    if (!item) { body.innerHTML = ""; return; }
    if (item.type === "measure") {
      const dist = Math.hypot(item.x2 - item.x1, item.y2 - item.y1);
      body.innerHTML = `<div>Distance: <b>${dist.toFixed(2)}m</b></div>
        <hr><button id="pDelete" class="danger" style="width:100%;">Delete</button>`;
      document.getElementById("pDelete").addEventListener("click", deleteSelection);
      return;
    }
    let html = `<div id="propsGrid2b" style="display:grid;grid-template-columns:1fr 1fr;gap:0 8px;">
                <div><label>X (m)</label><input id="pX" type="number" step="0.05" value="${item.x.toFixed(2)}"></div>
                <div><label>Y (m)</label><input id="pY" type="number" step="0.05" value="${item.y.toFixed(2)}"></div></div>`;
    if (item.type !== "comment" && item.type !== "textbox") {
      html += `<label>Rotation</label><input id="pRot" type="number" step="1" value="${(item.rot||0).toFixed(0)}">`;
    }
    if (item.type === "comment") {
      html += `<label>Text</label><textarea id="pText">${item.text||""}</textarea>
                <label>Font size</label><input id="pFont" type="number" value="${item.fontSize||14}">`;
    }
    if (item.type === "textbox") {
      html += `<label>Text (2 lines)</label><textarea id="pText">${item.text||"City\nDate & Time"}</textarea>`;
      html += `<label>Opacity</label><input id="pCityOpacity" type="range" min="0" max="1" step="0.05" value="${item.opacity !== undefined ? item.opacity : 1}">`;
      html += `<label>Width</label><input id="pCityW" type="number" step="5" value="${item.w || 160}">`;
      html += `<label>Height</label><input id="pCityH" type="number" step="5" value="${item.h || 50}">`;
    }
    if (item.type === "chair" || item.type === "stand" || item.type === "piano") {
      html += `<label>Size (x scale)</label><input id="pScale" type="number" step="0.1" min="0.1" value="${item.scale||1}">`;
    }
    if (item.type === "riser") {
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 8px;">
                <div><label>Length (m)</label><input id="pL" type="number" step="0.1" min="0.1" value="${item.l||2.4}"></div>
                <div><label>Width (m)</label><input id="pWd" type="number" step="0.1" min="0.1" value="${item.wd||1.2}"></div></div>`;
    }
    html += `<hr><button id="pDelete" class="danger" style="width:100%;">Delete</button>`;
    body.innerHTML = html;
    body.querySelectorAll("input,textarea").forEach(el => el.addEventListener("change", () => applyPropsEdit(item.id)));
    document.getElementById("pDelete").addEventListener("click", deleteSelection);
  } else {
    body.innerHTML = `<em>${selection.size} items selected</em><br><button id="pDelete" class="danger" style="width:100%;margin-top:8px;">Delete</button>`;
    document.getElementById("pDelete").addEventListener("click", deleteSelection);
  }
}

function deleteSelection() {
  if (selection.size === 0) return;
  model.items = model.items.filter(i => !selection.has(i.id));
  selection.clear();
  pushHistory(); render(); scheduleAutosave();
}

function applyPropsEdit(id) {
  const item = model.items.find(i => i.id === id);
  if (!item) return;
  const pX = document.getElementById("pX"), pY = document.getElementById("pY");
  const pRot = document.getElementById("pRot"), pText = document.getElementById("pText"), pFont = document.getElementById("pFont");
  const pScale = document.getElementById("pScale"), pL = document.getElementById("pL"), pWd = document.getElementById("pWd");
  const pCityOpacity = document.getElementById('pCityOpacity'), pCityW = document.getElementById('pCityW'), pCityH = document.getElementById('pCityH');
  if (pX) item.x = parseFloat(pX.value) || 0;
  if (pY) item.y = parseFloat(pY.value) || 0;
  if (pRot) item.rot = parseFloat(pRot.value) || 0;
  if (pText) item.text = pText.value;
  if (pFont) item.fontSize = parseFloat(pFont.value) || 14;
  if (pScale) item.scale = parseFloat(pScale.value) || 1;
  if (pL) item.l = parseFloat(pL.value) || 2.4;
  if (pWd) item.wd = parseFloat(pWd.value) || 1.2;
  if (pCityOpacity) item.opacity = parseFloat(pCityOpacity.value);
  if (pCityW) item.w = parseFloat(pCityW.value) || 160;
  if (pCityH) item.h = parseFloat(pCityH.value) || 50;
  pushHistory(); render(); scheduleAutosave();
}

/* ============ TOOL SYSTEM (Photoshop-style) ============ */
let activeTool = null; // 'select'|'direct'|'marquee'|'measure'|'crop'|'hand'|'zoom'
let zoomFactor = 1;
const ZOOM_STEP = 0.1;
const ZOOM_MIN = 0.2;
const ZOOM_MAX = 5;


const TOOL_SHORTCUTS = {
  v: 'select', a: 'direct', m: 'marquee', i: 'measure', c: 'crop', h: 'hand', z: 'zoom'
};

function setTool(t) {
  if (t && t === 'measure') measureDraft = null;
  if (t && t === 'crop') { cropState = null; updateCropOverlay(); }
  if (t) { tool = null; } // deactivate item placement tool
  activeTool = activeTool === t ? null : t;
  document.querySelectorAll("#modTools button[data-tool]").forEach(b =>
    b.classList.toggle("active", b.dataset.tool === activeTool));
  document.querySelectorAll("#modItems button[data-tool]").forEach(b => b.classList.remove("active"));
  updateCanvasCursor();
}

function updateCanvasCursor() {
  const cw = document.getElementById('canvasWrap');
  cw.classList.toggle('hand-mode', activeTool === 'hand');
  cw.classList.toggle('crop-mode', activeTool === 'crop');
  svg.style.cursor = activeTool === 'measure' || activeTool === 'crop' ? 'crosshair'
    : activeTool === 'hand' ? 'grab'
    : activeTool === 'zoom' ? 'zoom-in'
    : 'default';
}

document.querySelectorAll("#modTools button[data-tool]").forEach(btn => {
  btn.addEventListener("click", () => {
    setTool(btn.dataset.tool);
    if (activeTool && window.matchMedia("(max-width: 820px)").matches) window._closePanels();
  });
});

window.addEventListener('keydown', (e) => {
  if (e.key === ' ' && !e.repeat && document.activeElement && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (activeTool !== 'hand') { _prevToolBeforeSpace = activeTool; setTool('hand'); }

});

    const prev = _prevToolBeforeSpace;

});

/* ============ LENGTH CONVERTER (meters <-> feet+inches) ============ */
(function () {
  const ftEl = document.getElementById("convFt");
  const inEl = document.getElementById("convIn");
  const mEl = document.getElementById("convM");
  const errEl = document.getElementById("convErr");
  const clearBtn = document.getElementById("convClearBtn");
  const M_PER_FT = 0.3048, M_PER_IN = 0.0254;
  let syncing = false;

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.style.display = msg ? "block" : "none";
  }
  function round(n, d) { const p = 10 ** d; return Math.round(n * p) / p; }

  function setFromMeters(meters) {
    if (!isFinite(meters)) { showErr("Enter a valid number"); return; }
    showErr("");
    syncing = true;
    mEl.value = round(meters, 4);
    const totalFt = meters / M_PER_FT;
    const wholeFt = Math.trunc(totalFt);
    const remInches = (totalFt - wholeFt) * 12;
    ftEl.value = wholeFt;
    inEl.value = round(remInches, 2);
    syncing = false;
  }
  function setFromFtIn(ft, inches) {
    setFromMeters((ft + inches / 12) * M_PER_FT);
  }

  mEl.addEventListener("change", () => {
    if (syncing) return;
    if (mEl.value.trim() === "") { showErr(""); return; }
    const v = parseFloat(mEl.value);
    if (isNaN(v)) { showErr("Meters must be a number"); return; }
    setFromMeters(v);
  });
  function onFtInChange() {
    if (syncing) return;
    if (ftEl.value.trim() === "" && inEl.value.trim() === "") { showErr(""); return; }
    const ft = ftEl.value.trim() === "" ? 0 : parseFloat(ftEl.value);
    const inches = inEl.value.trim() === "" ? 0 : parseFloat(inEl.value);
    if (isNaN(ft) || isNaN(inches)) { showErr("Feet/inches must be numbers"); return; }
    setFromFtIn(ft, inches);
  }
  ftEl.addEventListener("input", onFtInChange);
  inEl.addEventListener("input", onFtInChange);

  clearBtn.addEventListener("click", () => {
    syncing = true;
    ftEl.value = ""; inEl.value = ""; mEl.value = "";
    syncing = false;
    showErr("");
  });
})();

/* ============ CANVAS POINTER HANDLING ============ */
let drag = null;

function viewScale() {
  const rect = svg.getBoundingClientRect();
  return rect.width ? rect.width / 1200 : 1;
}
function clientToCanvas(clientX, clientY) {
  const rect = svg.getBoundingClientRect();
  const vs = viewScale();
  return { x: (clientX - rect.left) / vs, y: (clientY - rect.top) / vs };
}
let _lastCanvasPos = { x: 0, y: 0 };

svg.addEventListener("pointerdown", (e) => {
  const { x: cx, y: cy } = clientToCanvas(e.clientX, e.clientY);
  _lastCanvasPos = { x: cx, y: cy };

  // ----- Hand tool -----
  if (activeTool === 'hand') {
    const cw = document.getElementById('canvasWrap');
    handPanData = { startX: e.clientX, startY: e.clientY, scrollLeft: cw.scrollLeft, scrollTop: cw.scrollTop };
    cw.style.cursor = 'grabbing';
    svg.setPointerCapture(e.pointerId);
    return;
  }

  // ----- Crop tool -----
  if (activeTool === 'crop') {
    cropState = null; updateCropOverlay(); showCropConfirm();
    drag = { mode: 'crop', startX: cx, startY: cy, curX: cx, curY: cy };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  // ----- Measure tool (live 2-point ruler) -----
  if (activeTool === 'measure') {
    if (measureDraft) {
      const x2M = snap(e.shiftKey ? measureDraft.x1 : cx / S());
      const y2M = snap(e.shiftKey ? cy / S() : cx / S());
      // Shift constraint: if shift, lock to horizontal or vertical
      let ex = cx / S(), ey = cy / S();
      if (e.shiftKey) {
        const dx = Math.abs(cx / S() - measureDraft.x1);
        const dy = Math.abs(cy / S() - measureDraft.y1);
        if (dx > dy) ey = measureDraft.y1; else ex = measureDraft.x1;
      }
      createMeasure(measureDraft.x1, measureDraft.y1, snap(ex), snap(ey));
      measureDraft = null;
      if (!document.getElementById('keepPlacing').checked) setTool(null);
      return;
    } else {
      measureDraft = { x1: snap(cx / S()), y1: snap(cy / S()) };
      render();
      return;
    }
  }

  // ----- Direct Select (select similar) -----
  if (activeTool === 'direct') {
    const itemEl = e.target.closest('.item');
    if (itemEl) {
      const id = itemEl.dataset.id;
      const item = model.items.find(i => i.id === id);
      if (item) {
        selection.clear();
        for (const it of model.items) {
          if (it.type === item.type) selection.add(it.id);
        }
        pushHistory(); render(); scheduleAutosave();
        return;
      }
    }
    selection.clear(); render();
    return;
  }

  // ----- Zoom tool -----
  if (activeTool === 'zoom') {
    if (e.altKey || e.metaKey) zoomOut(); else zoomIn();
    return;
  }

  // ----- Marquee (rubber-band selection) -----
  if (activeTool === 'marquee') {
    drag = { mode: 'rubber', startX: cx, startY: cy, curX: cx, curY: cy };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const rulerHandle = e.target.closest(".ruler-handle");
  if (rulerHandle) {
    drag = { mode: "ruler" };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const rotHandle = e.target.closest(".rot-handle");
  if (rotHandle) {
    const id = rotHandle.dataset.id;
    const item = model.items.find(i => i.id === id);
    drag = { mode: "rotate", id, startRot: item.rot || 0 };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const measureHandle = e.target.closest(".measure-handle");
  if (measureHandle) {
    const id = measureHandle.dataset.id, end = measureHandle.dataset.end;
    selection.clear(); selection.add(id);
    pushHistory();
    drag = { mode: "measure-endpoint", id, end };
    svg.setPointerCapture(e.pointerId);
    render();
    return;
  }
  const measureLabel = e.target.closest('[data-role="measure-label"]');
  if (measureLabel) {
    const id = measureLabel.dataset.id;
    const item = model.items.find(i => i.id === id);
    selection.clear(); selection.add(id);
    pushHistory();
    drag = { mode: "measure-move", id, startClientX: e.clientX, startClientY: e.clientY, startX1: item.x1, startY1: item.y1, startX2: item.x2, startY2: item.y2 };
    svg.setPointerCapture(e.pointerId);
    render();
    return;
  }

  const itemEl = e.target.closest(".item");
  if (itemEl) {
    const id = itemEl.dataset.id;
    if (e.shiftKey) {
      selection.has(id) ? selection.delete(id) : selection.add(id);
    } else if (!selection.has(id)) {
      selection.clear(); selection.add(id);
    }
    // Include group members
    const clicked = model.items.find(i => i.id === id);
    if (clicked && clicked.groupId) {
      for (const it of model.items) {
        if (it.groupId === clicked.groupId) selection.add(it.id);
      }
    }
    pushHistory();
    const startPositions = {};
    for (const sid of selection) {
      const it = model.items.find(i => i.id === sid);
      if (it) startPositions[sid] = { x: it.x, y: it.y };
    }
    drag = { mode: "move", startClientX: e.clientX, startClientY: e.clientY, startPositions };
    svg.setPointerCapture(e.pointerId);
    render();
    return;
  }

  // ----- Bounding box interaction -----
  const bboxMove = e.target.closest('[data-bbox-move]');
  if (bboxMove && selection.size > 0) {
    pushHistory();
    const startPositions = {};
    for (const sid of selection) {
      const it = model.items.find(i => i.id === sid);
      if (it) startPositions[sid] = { x: it.x, y: it.y };
    }
    drag = { mode: 'bbox-move', startClientX: e.clientX, startClientY: e.clientY, startPositions };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const bboxResize = e.target.closest('[data-bbox-resize]');
  if (bboxResize && selection.size > 0) {
    const selItems = model.items.filter(i => selection.has(i.id));
    const s = S();
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const it of selItems) {
      const ix = it.x * s, iy = it.y * s;
      minX = Math.min(minX, ix); minY = Math.min(minY, iy);
      maxX = Math.max(maxX, ix); maxY = Math.max(maxY, iy);
    }
    const pad = 16;
    const bboxL = minX - pad, bboxT = minY - pad, bboxW = Math.max(maxX - minX + pad * 2, 40), bboxH = Math.max(maxY - minY + pad * 2, 40);
    pushHistory();
    drag = {
      mode: 'bbox-resize', startClientX: e.clientX, startClientY: e.clientY,
      startBBox: { l: bboxL, t: bboxT, w: bboxW, h: bboxH },
      startPositions: JSON.parse(JSON.stringify(selItems.map(i => ({ id: i.id, x: i.x, y: i.y, scale: i.scale, w: i.w, h: i.h }))))
    };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const bboxRot = e.target.closest('[data-bbox-rot]');
  if (bboxRot && selection.size > 0) {
    const selItems = model.items.filter(i => selection.has(i.id));
    const s = S();
    let cx_sum = 0, cy_sum = 0;
    for (const it of selItems) { cx_sum += it.x * s; cy_sum += it.y * s; }
    const cx = cx_sum / selItems.length, cy = cy_sum / selItems.length;
    const initData = selItems.map(it => ({
      id: it.id, x: it.x, y: it.y, rot: it.rot || 0,
      angle: Math.atan2(it.y * s - cy, it.x * s - cx),
      dist: Math.hypot(it.x * s - cx, it.y * s - cy)
    }));
    drag = { mode: 'bbox-rot', cx, cy, initData, lastAngle: Math.atan2(_lastCanvasPos.x - cx, -(_lastCanvasPos.y - cy)) * 180 / Math.PI };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  if (tool) {
    placeItem(tool, cx / S(), cy / S());
    if (!document.getElementById("keepPlacing").checked) {
      tool = null;
      document.querySelectorAll("#modItems button[data-tool]").forEach(b => b.classList.remove("active"));
    }
    return;
  }

  const bgResize = e.target.closest(".bg-resize");
  if (bgResize) {
    const bg = model.background;
    drag = { mode: "bgresize", startClientX: e.clientX, startClientY: e.clientY, startW: bg.w, startH: bg.h, aspect: bg.w / bg.h };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  const bgImg = e.target.closest("[data-bg]");
  if (bgImg) {
    drag = { mode: "bg", startClientX: e.clientX, startClientY: e.clientY, startX: model.background.x, startY: model.background.y };
    svg.setPointerCapture(e.pointerId);
    return;
  }

  // Select tool (V) just deselects on empty click; Marquee (M) uses rubberband
  if (activeTool === 'select') { selection.clear(); render(); return; }
  if (!e.shiftKey) selection.clear();
  drag = { mode: "rubber", startX: cx, startY: cy, curX: cx, curY: cy };
  svg.setPointerCapture(e.pointerId);
  render();
});

svg.addEventListener("pointermove", (e) => {
  _lastCanvasPos = clientToCanvas(e.clientX, e.clientY);
  const { x: cx, y: cy } = _lastCanvasPos;
  const vs = viewScale();

  // Hand tool pan
  if (handPanData) {
    const cw = document.getElementById('canvasWrap');
    cw.scrollLeft = handPanData.scrollLeft - (e.clientX - handPanData.startX);
    cw.scrollTop = handPanData.scrollTop - (e.clientY - handPanData.startY);
    return;
  }

  if (!drag) {
    // Live measure line update when first point placed
    if (activeTool === 'measure' && measureDraft) render();
    return;
  }

  // Crop drag
  if (drag.mode === 'crop') {
    drag.curX = cx; drag.curY = cy;
    cropState = { x1: drag.startX, y1: drag.startY, x2: cx, y2: cy };
    updateCropOverlay();
    return;
  }

  if (drag.mode === "bg") {
    if (model.background.locked) return;
    model.background.x = drag.startX + (e.clientX - drag.startClientX) / vs;
    model.background.y = drag.startY + (e.clientY - drag.startClientY) / vs;
    render();
  } else if (drag.mode === "bgresize") {
    if (model.background.locked) return;
    const dw = (e.clientX - drag.startClientX) / vs;
    const newW = Math.max(20, drag.startW + dw);
    model.background.w = newW;
    model.background.h = newW / drag.aspect;
    render();
  } else if (drag.mode === "ruler") {
    model.ruler.y = cy;
    render();
  } else if (drag.mode === "move") {
    const dxM = (e.clientX - drag.startClientX) / vs / S();
    const dyM = (e.clientY - drag.startClientY) / vs / S();
    for (const [sid, start] of Object.entries(drag.startPositions)) {
      const it = model.items.find(i => i.id === sid);
      if (it) { it.x = snap(start.x + dxM); it.y = snap(start.y + dyM); }
    }
    render();
  } else if (drag.mode === "rotate") {
    const it = model.items.find(i => i.id === drag.id);
    if (it) {
      const s = S();
      const centerX = it.x * s, centerY = it.y * s;
      const angle = Math.atan2(cx - centerX, -(cy - centerY)) * 180 / Math.PI;
      it.rot = Math.round(angle);
      render();
    }
  } else if (drag.mode === "rubber") {
    drag.curX = cx; drag.curY = cy;
    drawRubberBand();
  } else if (drag.mode === "measure-endpoint") {
    const it = model.items.find(i => i.id === drag.id);
    if (it) {
      const xM = snap(cx / S()), yM = snap(cy / S());
      if (drag.end === "1") { it.x1 = xM; it.y1 = yM; } else { it.x2 = xM; it.y2 = yM; }
      render();
    }
  } else if (drag.mode === "measure-move") {
    const it = model.items.find(i => i.id === drag.id);
    if (it) {
      const dxM = (e.clientX - drag.startClientX) / vs / S();
      const dyM = (e.clientY - drag.startClientY) / vs / S();
      it.x1 = snap(drag.startX1 + dxM); it.y1 = snap(drag.startY1 + dyM);
      it.x2 = snap(drag.startX2 + dxM); it.y2 = snap(drag.startY2 + dyM);
      render();
    }
  } else if (drag.mode === 'bbox-move') {
    const dxM = (e.clientX - drag.startClientX) / vs / S();
    const dyM = (e.clientY - drag.startClientY) / vs / S();
    for (const [sid, start] of Object.entries(drag.startPositions)) {
      const it = model.items.find(i => i.id === sid);
      if (it) { it.x = snap(start.x + dxM); it.y = snap(start.y + dyM); }
    }
    render();
  } else if (drag.mode === 'bbox-resize') {
    const s = S();
    const dx = (e.clientX - drag.startClientX) / vs;
    const dy = (e.clientY - drag.startClientY) / vs;
    const b = drag.startBBox;
    const scaleX = (b.w + dx) / b.w;
    const scaleY = (b.h + dy) / b.h;
    const sc = Math.min(scaleX, scaleY);
    const cx = b.l + b.w / 2, cy = b.t + b.h / 2;
    for (const sp of drag.startPositions) {
      const it = model.items.find(i => i.id === sp.id);
      if (it) {
        const origX = sp.x * s, origY = sp.y * s;
        const relX = origX - cx, relY = origY - cy;
        it.x = (cx + relX * sc) / s;
        it.y = (cy + relY * sc) / s;
        if (it.scale !== undefined) it.scale = Math.max(0.1, (sp.scale || 1) * sc);
        if (it.type === 'textbox' && it.w) { it.w = Math.max(40, (sp.w || it.w) * sc); it.h = Math.max(20, (sp.h || it.h) * sc); }
      }
    }
    render();
  } else if (drag.mode === 'bbox-rot') {
    const s = S();
    const angle = Math.atan2(_lastCanvasPos.x - drag.cx, -(_lastCanvasPos.y - drag.cy)) * 180 / Math.PI;
    const delta = angle - drag.lastAngle;
    for (const d of drag.initData) {
      const newAngle = d.angle + delta * Math.PI / 180;
      const it = model.items.find(i => i.id === d.id);
      if (it) {
        it.x = (drag.cx + d.dist * Math.cos(newAngle)) / s;
        it.y = (drag.cy + d.dist * Math.sin(newAngle)) / s;
        if (it.rot !== undefined) it.rot = d.rot + delta;
      }
    }
    render();
  }
});

svg.addEventListener("pointerup", (e) => {
  if (handPanData) {
    handPanData = null;
    document.getElementById('canvasWrap').style.cursor = '';
    return;
  }
  if (!drag) return;
  if (drag.mode === "rubber") {
    const x1 = Math.min(drag.startX, drag.curX), x2 = Math.max(drag.startX, drag.curX);
    const y1 = Math.min(drag.startY, drag.curY), y2 = Math.max(drag.startY, drag.curY);
    const s = S();
    for (const it of model.items) {
      const sx = it.x * s, sy = it.y * s;
      if (sx >= x1 && sx <= x2 && sy >= y1 && sy <= y2) selection.add(it.id);
    }
    removeRubberBand();
  } else if (drag.mode === "move" || drag.mode === "rotate" || drag.mode === "bg" || drag.mode === "bgresize" || drag.mode === "ruler" || drag.mode === "measure-endpoint" || drag.mode === "measure-move" || drag.mode === 'bbox-move' || drag.mode === 'bbox-resize' || drag.mode === 'bbox-rot') {
    pushHistory();
  } else if (drag.mode === 'crop') {
    cropState = { x1: drag.startX, y1: drag.startY, x2: drag.curX, y2: drag.curY };
    updateCropOverlay();
    showCropConfirm();
  }
  drag = null;
  render(); scheduleAutosave();
});

function drawRubberBand() {

  const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  r.setAttribute("id", "rubberband");
  r.setAttribute("x", x); r.setAttribute("y", y); r.setAttribute("width", w); r.setAttribute("height", h);

function createRiser(l, wd, h) {
  const cxM = (CANVAS_W / 2) / S(), cyM = (svg.clientHeight / 2 || 300) / S();

  model.items.push(riser);

  const label = { id: newId(), type: "comment", x: snap(cxM), y: labelY, text: `${l}x${wd}x${h}`, fontSize: 13 };

/* ============ CROP TOOL ============ */
let cropState = null; // null or {x1,y1,x2,y2} in canvas coords

function updateCropOverlay() {
  let el = document.getElementById('crop-overlay');
  if (!el) {
    el = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    el.id = 'crop-overlay';
    svg.appendChild(el);
  }
  el.innerHTML = '';
  if (!cropState) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  const { x1, y1, x2, y2 } = cropState;
  const vb = svg.viewBox.baseVal;
  const cw = vb.width, ch = vb.height;
  const l = Math.min(x1, x2), r = Math.max(x1, x2);
  const t = Math.min(y1, y2), b = Math.max(y1, y2);
  const shade = (x, y, w, h) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="crop-shade"/>`;
  el.innerHTML = shade(0, 0, cw, t) + shade(0, t, l, b-t) + shade(r, t, cw-r, b-t) + shade(0, b, cw, ch-b)
    + `<rect x="${l}" y="${t}" width="${r-l}" height="${b-t}" class="crop-rect"/>`;
}

function applyCrop() {
  if (!cropState) return;
  const { x1, y1, x2, y2 } = cropState;
  const l = Math.min(x1, x2), r = Math.max(x1, x2);
  const t = Math.min(y1, y2), b = Math.max(y1, y2);
  if (r - l < 10 || b - t < 10) { cropState = null; updateCropOverlay(); return; }
  const s = S();
  for (const it of model.items) {
    it.x = (it.x * s - l) / s;
    it.y = (it.y * s - t) / s;
  }
  const bg = model.background;
  if (bg.dataUrl) { bg.x -= l; bg.y -= t; }
  pushHistory(); render(); scheduleAutosave();
  cropState = null; updateCropOverlay();
}

  const t = Math.min(cropState.y1, cropState.y2), b = Math.max(cropState.y1, cropState.y2);

/* ============ ZOOM ============ */
function applyZoom() {
  const svgEl = svg;
  const scale = zoomFactor;
  svgEl.style.transform = `scale(${scale})`;
  svgEl.style.transformOrigin = '0 0';
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
}
function zoomIn() {
  zoomFactor = Math.min(ZOOM_MAX, zoomFactor + ZOOM_STEP);
  applyZoom();
}
function zoomOut() {
  zoomFactor = Math.max(ZOOM_MIN, zoomFactor - ZOOM_STEP);
  applyZoom();
}
function zoomReset() {
  zoomFactor = 1;
  applyZoom();
}

/* ============ BOUNDING BOX RENDERING ============ */
function renderBoundingBox() {
  const selItems = model.items.filter(i => selection.has(i.id));
  if (selItems.length === 0) return '';
  const s = S();
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const it of selItems) {
    const ix = it.x * s, iy = it.y * s;
    minX = Math.min(minX, ix); minY = Math.min(minY, iy);
    maxX = Math.max(maxX, ix); maxY = Math.max(maxY, iy);
  }
  const pad = 16;
  const l = minX - pad, t = minY - pad, w = maxX - minX + pad * 2, h = maxY - minY + pad * 2;
  const cx = l + w / 2;
  let html = `<rect x="${l}" y="${t}" width="${w}" height="${h}" class="bbox" data-bbox="1"/>
    <rect x="${l}" y="${t}" width="${w}" height="${h}" fill="var(--accent)" fill-opacity="0.04" stroke="none" data-bbox-move="1" style="cursor:move"/>`;
  const hsz = 8;
  for (const [hx, hy] of [[l,t],[l+w,t],[l,t+h],[l+w,t+h],[cx-hsz/2,t],[cx-hsz/2,t+h],[l,t+h/2-hsz/2],[l+w,t+h/2-hsz/2]]) {
    html += `<rect x="${hx-hsz/2}" y="${hy-hsz/2}" width="${hsz}" height="${hsz}" fill="var(--surface-2)" stroke="var(--accent)" stroke-width="1.5" rx="1" style="cursor:nwse-resize" data-bbox-resize="1"/>`;
  }
  const rotY = t - 24;
  html += `<line x1="${cx}" y1="${t}" x2="${cx}" y2="${rotY+8}" stroke="var(--accent)" stroke-width="1.5" pointer-events="none"/>
    <circle cx="${cx}" cy="${rotY}" r="10" fill="var(--accent)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:grab" data-bbox-rot="1"/>`;
  return html;
}

/* ============ HAND TOOL ============ */
let handPanData = null;
window.addEventListener("keydown", (e) => {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA") return;

  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "y") { e.preventDefault(); redo(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "d") {
    e.preventDefault();
    duplicateSelection();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "c") {
    e.preventDefault();
    copySelection();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "x") {
    e.preventDefault();
    copySelection();
    if (selection.size > 0) {
      model.items = model.items.filter(i => !selection.has(i.id));
      selection.clear();
      pushHistory(); render(); scheduleAutosave();
    }
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "v") {
    e.preventDefault();
    pasteClipboard();
    return;
  }
  if (e.key === "Escape") {
    if (measureDraft) { measureDraft = null; render(); return; }
    selection.clear(); render(); return;
  }
  if ((e.key === "Delete" || e.key === "Backspace") && selection.size > 0) {
    e.preventDefault();
    model.items = model.items.filter(i => !selection.has(i.id));
    selection.clear();
    pushHistory(); render(); scheduleAutosave();
    return;
  }
  if (e.key === "r" || e.key === "R") {
    if (selection.size === 0) return;
    const delta = e.key === "R" ? -15 : 15;
    for (const id of selection) {
      const it = model.items.find(i => i.id === id);
      if (it && it.rot !== undefined) it.rot = (it.rot || 0) + delta;
    }
    pushHistory(); render(); scheduleAutosave();
    return;
  }
  // Photoshop tool shortcuts
  if (TOOL_SHORTCUTS[e.key.toLowerCase()] && !(e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    setTool(TOOL_SHORTCUTS[e.key.toLowerCase()]);
    return;
  }

  // Group (Ctrl+G)
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'g' && !e.shiftKey) {
    e.preventDefault();
    groupSelection();
    return;
  }
  // Ungroup (Ctrl+Shift+G)
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'g' && e.shiftKey) {
    e.preventDefault();
    ungroupSelection();
    return;
  }

  // Zoom in/out (Ctrl+= / Ctrl+- / Ctrl+0)
  if ((e.metaKey || e.ctrlKey) && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomIn(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === '-' || e.key === '_')) { e.preventDefault(); zoomOut(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '0') { e.preventDefault(); zoomReset(); return; }

  // Confirm crop (Enter)
  if (e.key === 'Enter' && cropState) {
    e.preventDefault();
    applyCrop();
    return;
  }
  // Cancel crop (Escape)
  if (e.key === 'Escape' && cropState) {
    cropState = null; updateCropOverlay(); setTool(null); render();
    return;
  }

  if (e.key.startsWith("Arrow")) {
    if (selection.size === 0) return;
    e.preventDefault();
    const step = e.shiftKey ? 0.25 : 0.05;
    const dx = e.key === "ArrowLeft" ? -step : e.key === "ArrowRight" ? step : 0;
    const dy = e.key === "ArrowUp" ? -step : e.key === "ArrowDown" ? step : 0;
    for (const id of selection) {
      const it = model.items.find(i => i.id === id);
      if (it) { it.x = snap(it.x + dx); it.y = snap(it.y + dy); }
    }
    pushHistory(); render(); scheduleAutosave();
  }
});

/* ============ GROUP / UNGROUP ============ */
function groupSelection() {
  if (selection.size < 2) return;
  const gid = 'g' + Date.now();
  for (const id of selection) {
    const it = model.items.find(i => i.id === id);
    if (it) it.groupId = gid;
  }
  pushHistory(); render(); scheduleAutosave();
}
function ungroupSelection() {
  if (selection.size === 0) return;
  for (const id of selection) {
    const it = model.items.find(i => i.id === id);
    if (it) it.groupId = undefined;
  }
  pushHistory(); render(); scheduleAutosave();
}
document.getElementById('groupBtn').addEventListener('click', groupSelection);
document.getElementById('ungroupBtn').addEventListener('click', ungroupSelection);

function duplicateSelection() {
  if (selection.size === 0) return;
  const newIds = [];
  for (const id of [...selection]) {
    const orig = model.items.find(i => i.id === id);
    if (!orig) continue;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = newId();
    copy.x += 0.3; copy.y += 0.3;
    model.items.push(copy);
    newIds.push(copy.id);
  }
  selection.clear();
  newIds.forEach(id => selection.add(id));
  pushHistory(); render(); scheduleAutosave();
}

let clipboard = [];
function copySelection() {
  if (selection.size === 0) return;
  clipboard = [...selection].map(id => model.items.find(i => i.id === id)).filter(Boolean).map(i => JSON.parse(JSON.stringify(i)));
}
function pasteClipboard() {
  if (clipboard.length === 0) return;
  const newIds = [];
  for (const orig of clipboard) {
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = newId();
    copy.x += 0.3; copy.y += 0.3;
    model.items.push(copy);
    newIds.push(copy.id);
  }
  selection.clear();
  newIds.forEach(id => selection.add(id));
  pushHistory(); render(); scheduleAutosave();
}

/* ============ PERSISTENCE ============ */
let autosaveTimer = null;
let dirtySinceLastPeriodicSave = false;
function scheduleAutosave() {
  dirtySinceLastPeriodicSave = true;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(model));
  }, 1000);
}
setInterval(() => {
  if (!dirtySinceLastPeriodicSave) return;
  localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(model));
  dirtySinceLastPeriodicSave = false;
}, 120000);

function loadFromModel(m) {
  const d = emptyModel();
  m.background = Object.assign({}, d.background, m.background || {});
  m.ruler = Object.assign({}, d.ruler, m.ruler || {});
  m.meta = Object.assign({}, d.meta, m.meta || {});
  m.canvasMeters = m.canvasMeters || d.canvasMeters;
  m.items = m.items || [];
  model = m;
  selection.clear();
  editingId = null;
  let max = 0;
  for (const it of model.items) {
    const n = parseInt((it.id||"").replace("i",""), 10);
    if (!isNaN(n)) max = Math.max(max, n);
  }
  idCounter = max + 1;
  document.getElementById("bgOpacity").value = model.background.opacity;
  document.getElementById("metaTitle").value = model.meta.title || '';
  history = [JSON.stringify(model)]; historyIdx = 0;
  render();
}

/* ============ EXPORT PNG ============ */
document.getElementById("exportPngBtn").addEventListener("click", () => {
  const rect = svg.getBoundingClientRect();
  const w = rect.width || svg.clientWidth || 1200;
  const h = rect.height || svg.clientHeight || 900;
  const clone = svg.cloneNode(true);
  clone.setAttribute("width", w); clone.setAttribute("height", h);
  clone.removeAttribute("style");
  // resolve CSS custom properties to concrete colors for the export (canvas rasterizer ignores var())
  const cs = getComputedStyle(document.documentElement);
  const resolved = {
    "var(--text-primary)": cs.getPropertyValue("--text-primary").trim() || "#0b0b0b",
    "var(--text-secondary)": cs.getPropertyValue("--text-secondary").trim() || "#52514e",
    "var(--surface-1)": cs.getPropertyValue("--surface-1").trim() || "#fcfcfb",
    "var(--surface-2)": cs.getPropertyValue("--surface-2").trim() || "#ffffff",
    "var(--border-strong)": cs.getPropertyValue("--border-strong").trim() || "#c3c2b7",
    "var(--accent)": cs.getPropertyValue("--accent").trim() || "#2a78d6",
    "var(--accent-wash)": cs.getPropertyValue("--accent-wash").trim() || "rgba(42,120,214,0.10)",
    "var(--danger)": cs.getPropertyValue("--danger").trim() || "#d03b3b",
  };
  let xml = new XMLSerializer().serializeToString(clone);
  for (const [k, v] of Object.entries(resolved)) xml = xml.split(k).join(v);
  const svgBlob = new Blob([xml], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const canvasEl = document.createElement("canvas");
    canvasEl.width = w; canvasEl.height = h;
    const ctx = canvasEl.getContext("2d");
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    const pngUrl = canvasEl.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = pngUrl; a.download = "pit-config.png";
    document.body.appendChild(a); a.click(); a.remove();
  };
  img.onerror = () => { URL.revokeObjectURL(url); alert("PNG export failed to render the SVG."); };
  img.src = url;
});

/* ============ RESIZABLE SIDEBAR DIVIDERS ============ */
const SIDEBAR_WIDTH_KEY = "pitconfig-sidebar-widths";
(function initDividers() {
  const main = document.getElementById("main");
  let widths = { left: 200, right: 240 };
  try { widths = Object.assign(widths, JSON.parse(localStorage.getItem(SIDEBAR_WIDTH_KEY) || "{}")); } catch (e) {}
  applyWidths();

  function applyWidths() {
    if (window.matchMedia("(max-width: 820px)").matches) { main.style.gridTemplateColumns = ""; return; }
    main.style.gridTemplateColumns = `${widths.left}px 6px 1fr 6px ${widths.right}px`;
  }
  function startDrag(side, startClientX) {
    const startWidth = widths[side];
    const divider = document.getElementById(side === "left" ? "dividerLeft" : "dividerRight");
    divider.classList.add("dragging");
    function onMove(ev) {
      const dx = ev.clientX - startClientX;
      const next = side === "left" ? startWidth + dx : startWidth - dx;
      widths[side] = Math.max(140, Math.min(480, next));
      applyWidths();
      render();
    }
    function onUp() {
      divider.classList.remove("dragging");
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      localStorage.setItem(SIDEBAR_WIDTH_KEY, JSON.stringify(widths));
    }
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  document.getElementById("dividerLeft").addEventListener("pointerdown", (e) => { e.preventDefault(); startDrag("left", e.clientX); });
  document.getElementById("dividerRight").addEventListener("pointerdown", (e) => { e.preventDefault(); startDrag("right", e.clientX); });
  window.matchMedia("(max-width: 820px)").addEventListener("change", applyWidths);
})();

/* ============ SIDEBAR FONT / SIZE ============ */
const SIDEBAR_FONT_KEY = "pitconfig-sidebar-font";
(function initSidebarFont() {
  const fontSel = document.getElementById("sidebarFontSel");
  const sizeSel = document.getElementById("sidebarFontSizeSel");
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(SIDEBAR_FONT_KEY) || "{}"); } catch (e) {}
  if (saved.font) fontSel.value = saved.font;
  if (saved.size) sizeSel.value = saved.size;
  apply();
  function apply() {
    document.documentElement.style.setProperty("--sidebar-font", fontSel.value);
    document.documentElement.style.setProperty("--sidebar-font-size", sizeSel.value + "px");
  }
  function save() {
    localStorage.setItem(SIDEBAR_FONT_KEY, JSON.stringify({ font: fontSel.value, size: sizeSel.value }));
  }
  fontSel.addEventListener("change", () => { apply(); save(); });
  sizeSel.addEventListener("change", () => { apply(); save(); });
})();

/* ============ MODULE VERTICAL RESIZE ============ */
(function initModuleResize() {
  document.querySelectorAll(".hdivider").forEach(div => {
    div.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const targetId = div.dataset.module;
      const target = document.getElementById(targetId);
      const startH = target.getBoundingClientRect().height;
      const startY = e.clientY;
      div.classList.add("dragging");
      function onMove(ev) {
        const dh = ev.clientY - startY;
        const next = Math.max(28, startH + dh);
        target.style.flex = `0 0 ${next}px`;
      }
      function onUp() {
        div.classList.remove("dragging");
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
      }
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    });
  });
})();

/* ============ 2-POINT RULER TOOL (dashed line + linked distance comment) ============ */
function createMeasure(x1, y1, x2, y2) {
  const id = newId();
  const measure = { id, type: "measure", x1, y1, x2, y2 };
  model.items.push(measure);
  selection.clear(); selection.add(id);
  pushHistory(); render(); scheduleAutosave();
}
function measureLabelPos(m) {
  return { x: (m.x1 + m.x2) / 2, y: (m.y1 + m.y2) / 2 };
}
function renderMeasure(item, selected) {
  const s = S();
  const x1 = item.x1 * s, y1 = item.y1 * s, x2 = item.x2 * s, y2 = item.y2 * s;
  const distM = Math.hypot(item.x2 - item.x1, item.y2 - item.y1);
  const mid = measureLabelPos(item);
  const lx = mid.x * s, ly = mid.y * s;
  const label = distM.toFixed(2) + "m";
  const w = Math.max(30, label.length * 12 * 0.6) + 10, h = 20;
  return `<g class="item measure-item${selected ? " selected" : ""}" data-id="${item.id}">
    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--measure)" stroke-width="2" stroke-dasharray="6,4"/>
    <circle class="measure-handle" data-id="${item.id}" data-end="1" cx="${x1}" cy="${y1}" r="9" fill="var(--measure)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:move"/>
    <circle class="measure-handle" data-id="${item.id}" data-end="2" cx="${x2}" cy="${y2}" r="9" fill="var(--measure)" stroke="var(--surface-1)" stroke-width="1.5" style="cursor:move"/>
    <g transform="translate(${lx} ${ly})" data-id="${item.id}" data-role="measure-label" style="cursor:move">
      ${selected ? `<rect x="${-w/2-3}" y="${-h/2-3}" width="${w+6}" height="${h+6}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,3"/>` : ""}
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="5" fill="var(--surface-2)" fill-opacity="0.95" stroke="var(--border-strong)"/>
      <text x="0" y="4" text-anchor="middle" font-size="12" fill="var(--text-primary)">${label}</text>
    </g>
  </g>`;
}
window.addEventListener("resize", render);
</script>
